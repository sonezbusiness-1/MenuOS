<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cart - Restaurant Ordering</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="public/favicon/restaurant_logo-favicon.png">
    <style>
        .menu-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 560%;
            opacity: 0.;
            z-index: -1;
        }
    </style>
</head>
<body>
    <img src ="public/images/main-bg.png" alt="Menu Background" class="menu-bg">
    <!-- Header -->
    <header class="header">
        <div class="header-content">
            <img src ="public/images/header-bg.png" alt="Header Background" class="header-img">
            <div class="header-top">
                <button id="backBtn" class="back-button">
                    <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                        <line x1="18" y1="6" x2="6" y2="18"/>
                        <line x1="6" y1="6" x2="18" y2="18"/>
                    </svg>
                </button>
                <h1 class="header-title">Your Cart</h1>
            </div>
        </div>
    </header>

    <!-- Empty Cart State -->
    <div id="emptyCart" class="empty-cart" style="display: none;">
        <svg class="empty-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="9" cy="21" r="1"></circle>
            <circle cx="20" cy="21" r="1"></circle>
            <path d="M1 1h4l2.68 12.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path>
        </svg>
        <p class="empty-text">Your cart is empty</p>
        <button id="browseMenuBtn" class="btn-secondary">Browse Menu</button>
    </div>

    <!-- Cart Items -->
    <div id="cartItems" class="cart-items-container">
        <!-- Cart items will be loaded here -->
    </div>

    <!-- Cart Summary Footer -->
    <div id="cartFooter" class="cart-footer" style="display: none;">
        <div class="cart-summary">
            <div class="summary-row">
                <span>Subtotal</span>
                <span id="subtotalAmount">LKR 0.00</span>
            </div>
            <div class="summary-row">
                <span>Tax (10%)</span>
                <span id="taxAmount">LKR 0.00</span>
            </div>
            <div class="summary-row total">
                <span>Total</span>
                <span id="totalAmount">LKR 0.00</span>
            </div>
        </div>
        <!-- ⭐ Single checkout button -->
        <button id="checkoutBtn" class="btn-primary" style="width: 100%; padding: 18px; font-size: 18px;">
        Next
        </button>
    </div>

    <script src="js/cart.js"></script>
</body>
</html>
