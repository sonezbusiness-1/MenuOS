<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome - Restaurant Ordering</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="icon" type="image/png" href="public/favicon/restaurant_logo-favicon.png">
</head>
<body>
    <div class="landing-container">
        <div class="landing-card">
            <div class="landing-icon">
                <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                    <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                </svg>
            </div>
            <h1 class="landing-title">Welcome!</h1>
            <p class="table-info" id="tableInfo">Table Demo</p>

            <div class="qr-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <rect x="3" y="3" width="7" height="7"/>
                    <rect x="14" y="3" width="7" height="7"/>
                    <rect x="3" y="14" width="7" height="7"/>
                    <rect x="14" y="14" width="7" height="7"/>
                </svg>
            </div>

            <p class="landing-description">
                Browse our delicious menu and place your order directly from your table
            </p>

            <div style="margin: 20px 0;">
                <input
                    type="text"
                    id="tableInput"
                    placeholder="Enter table number (e.g. 1)"
                    style="width: 100%; padding: 12px; border: 2px solid #ddd; border-radius: 8px; font-size: 16px; text-align: center;"
                    value="1"
                >
            </div>

            <button id="startOrderingBtn" class="btn-primary">
                Start Ordering
            </button>
        </div>
    </div>

    <script>
        document.getElementById('startOrderingBtn').addEventListener('click', () => {
            const table = document.getElementById('tableInput').value.trim() || '1';
            window.location.href = `menu.html?table=${encodeURIComponent(table)}`;
        });

        document.getElementById('tableInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                const table = e.target.value.trim() || '1';
                window.location.href = `menu.html?table=${encodeURIComponent(table)}`;
            }
        });

        // Auto-read table from URL param if present (for QR compatibility)
        const params = new URLSearchParams(window.location.search);
        const table = params.get('table');
        if (table) {
            document.getElementById('tableInput').value = table;
            document.getElementById('tableInfo').textContent = `Table ${table}`;
        }
    </script>
</body>
</html>
