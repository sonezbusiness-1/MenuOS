<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menu - Restaurant Ordering</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="public/favicon/restaurant_logo-favicon.png">
    <style>
        .menu-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 426%;
            opacity: 0.;
            z-index: -1;
        }
    </style>
</head>
<body>
    <!-- Header -->
    <header class="header">
        <div class="header-content">
            <img src ="public/images/header-bg.png" alt="Header Background" class="header-img">
            <div class="header-top">  
                <h1 class="header-title">Menu</h1>
                <button id="cartBtn" class="cart-button">
                    <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="9" cy="21" r="1"></circle>
                        <circle cx="20" cy="21" r="1"></circle>
                        <path d="M1 1h4l2.68 12.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path>
                    </svg>
                   <span id="cartBadge" class="cart-badge">0</span>
                </button>

            </div>
            
            <!-- Search Bar -->
            <div class="search-container">
                <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                    <circle cx="11" cy="11" r="8"/>
                    <path d="m21 21-4.35-4.35"/>
                </svg>
                <input type="text" id="searchInput" class="search-input" placeholder="Search menu...">
            </div>
        </div>
    </header>

    <!-- Categories -->
    <div class="categories-container">
        <div id="categoriesList" class="categories-list">
            <!-- Categories will be loaded here -->
        </div>
    </div>

    <!-- Menu Items -->
    <div class="menu-container">
        <img src ="public/images/main-bg.png" alt="Menu Background" class="menu-bg">
        <div id="loadingSpinner" class="loading-spinner">
            <div class="spinner"></div>
            <p>Loading menu...</p>
        </div>
        <div id="menuGrid" class="menu-grid">
            <!-- Menu items will be loaded here -->
        </div>
    </div>

    <!-- Item Detail Modal -->
    <div id="itemModal" class="modal">
        <div class="modal-content">
            <button id="closeModal" class="modal-close">
                <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                    <line x1="18" y1="6" x2="6" y2="18"/>
                    <line x1="6" y1="6" x2="18" y2="18"/>
                </svg> 
            </button>
            
            <div id="modalImage" class="modal-image">
                <span class="modal-emoji">🍽️</span>
            </div>
            
            <h2 id="modalName" class="modal-name"></h2>
            <p id="modalDescription" class="modal-description"></p>
            
            <div class="modal-info">
                <span class="info-item">
                    <svg class="icon-small" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                        <circle cx="12" cy="12" r="10"/>
                        <polyline points="12 6 12 12 16 14"/>
                    </svg>
                    <span id="modalTime"></span>
                </span>
                <span class="info-item">
                    <svg class="icon-small star" viewBox="0 0 24 24" fill="currentColor">
                        <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/>
                    </svg>
                    <span id="modalRating"></span>
                </span>
            </div>
            
            <p id="modalPrice" class="modal-price">$0.00</p>
            
            <button id="addToCartBtn" class="btn-primary">Add to Cart</button>
        </div>
    </div>

    <script src="js/menu.js"></script>

</body>
</html>
